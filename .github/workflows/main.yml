name: Flutter Build APK

on:
  push:
    branches:
      - master # Atau ganti ke 'main' jika itu nama branch utama Bos

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Langkah untuk mengubah teks Base64 dari Secret menjadi file fisik .jks
      - name: Decode Keystore
        run: echo "${{ secrets.APP_KEYSTORE_BASE64 }}" | base64 --decode > android/app/gereja-app.jks

      - name: Get Dependencies
        run: flutter pub get
        working-directory: . 

      - name: Build APK
        # Kita gunakan --debug karena Bos sebelumnya menggunakan debug
        # Namun sekarang sudah ditandatangani dengan kunci permanen
        run: flutter build apk --debug
        working-directory: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk