# 1. Matikan Daemon agar tidak ada proses nyangkut di RAM (PENTING!)
org.gradle.daemon=false
org.gradle.parallel=false

# 2. Batasi penggunaan RAM agar tidak crash di Tablet
org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=256m

# 3. Matikan download AAPT2 otomatis (Pakai yang kita instal manual)
android.aapt2FromMaven=false
android.useAapt2FromSpec=false

# 4. Standar AndroidX untuk Flutter
android.useAndroidX=true
android.enableJetifier=true

# 5. Tambahan khusus PRoot & OneSignal Bypass
org.gradle.vfs.watch=false
android.enableResourceOptimizations=false
android.aapt.namespacing=false

# Paksa Gradle jangan pakai daemon untuk AAPT2
android.aapt2.daemon.enabled=false
android.aapt2FromMaven=false