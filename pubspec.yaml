name: gereja_mobile
description: "Aplikasi Gereja GKII Siloam V2 - Flutter Version"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.70.0
  shimmer: ^3.0.0
  shared_preferences: ^2.3.5
  permission_handler: ^11.3.1
  share_plus: ^10.1.0
  audio_waveforms: ^1.0.5

  http: ^1.2.0
  html: ^0.15.4
  google_generative_ai: ^0.4.7

  image_picker: ^1.1.2
  file_picker: ^8.0.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0  # 👈 TAMBAHKAN ALAT INI BOS!
  open_filex: ^4.4.0
  audioplayers: ^5.2.1
  
  # 👇 VERSI ANDROID MODERN 👇
  record: ^5.1.2

  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.10
  google_sign_in: ^6.2.1
  onesignal_flutter: ^5.2.6

  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2

  # 👇 TAMBAHAN UNTUK EXPORT KEUANGAN (PDF & CSV) BOS 👇
  pdf: ^3.10.4
  csv: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/TB.SQLite3
    - assets/TJL.SQLite3
    - assets/videos/splash_video.mp4

# 👇 KUNCI KESELAMATAN SEJATI (TURUN KE 1.2.0) 👇
dependency_overrides:
  record_platform_interface: 1.2.0
  
  # 👇 MANTRA IKON APLIKASI 👇
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21 # Sesuaikan jika min_sdk Bos berbeda

# 👇 MANTRA SPLASH SCREEN 👇
flutter_native_splash:
  color: "#FFFFFF" # Warna background layarnya (ini Putih, bisa diganti kode hex lain)
  image: "assets/images/splash.png"
  android_12:
    image: "assets/images/splash.png"
    icon_background_color: "#FFFFFF"