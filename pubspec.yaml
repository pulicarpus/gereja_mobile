name: gereja_mobile
description: "Aplikasi Gereja GKII Siloam V2 - Flutter Version"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  intl: ^0.19.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  fl_chart: ^0.70.0
  http: ^1.2.0    # Tambahkan ini
  html: ^0.15.4   # Tambahkan ini
  
  # Ikon & Tampilan Modern
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0 # Tambahan: Untuk efek loading 'bayangan' yang smooth

  # Inti Firebase (SINKRON)
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.10

  # Login & Notifikasi
  google_sign_in: ^6.2.1
  onesignal_flutter: ^5.2.6

  # Penyimpanan & Berbagi Data
  shared_preferences: ^2.3.5
  share_plus: ^10.1.0       # WAJIB: Untuk fitur bagikan ayat ke WA/Medsos
  permission_handler: ^11.3.1 # WAJIB: Untuk handle izin Galeri/Kamera (Image Picker)

  # --- TAMBAHAN UNTUK ALKITAB SQLITE ---
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # --- PENDAFTARAN ASSETS ---
  assets:
    - assets/TB.SQLite3
    - assets/TJL.SQLite3
    # Tambahkan folder images jika ada foto-foto aset
    # - assets/images/